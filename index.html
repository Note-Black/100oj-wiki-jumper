<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
  <meta http-equiv="refresh" content="0;url=steam://run/282800">
  <link rel="icon" type="image/svg+xml" href="https://shared.fastly.steamstatic.com/community_assets/images/apps/282800/134fd07f20b8c919f572f28d9283635ff05a59e0.ico">
  <title>正在启动百分百鲜橙汁……</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #ff8c2e 0%, #ff6a1a 100%);
      font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      margin: 0;
      position: relative;
      box-shadow: inset 0 0 150px rgba(0, 0, 0, 0.2);
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle at 20% 30%, rgba(255, 220, 140, 0.25) 0%, transparent 35%),
                        radial-gradient(circle at 80% 70%, rgba(255, 180, 80, 0.3) 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, rgba(255, 245, 200, 0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: #fffaf2;
      border-radius: 2.5rem;
      max-width: 500px;
      width: 100%;
      padding: 2.8rem 2rem 2rem;
      box-shadow: 0 30px 50px rgba(180, 70, 10, 0.5), 0 10px 25px rgba(0, 0, 0, 0.2), inset 0 2px 8px rgba(255, 255, 200, 0.8);
      text-align: center;
      position: relative;
      z-index: 2;
      border: 1px solid rgba(255, 160, 50, 0.5);
      transition: transform 0.2s ease;
      animation: float-in 0.7s cubic-bezier(0.23, 1, 0.32, 1);
    }

    @keyframes float-in {
      0% {
        opacity: 0;
        transform: translateY(25px) scale(0.96);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .main-message {
      font-size: 1.9rem;
      font-weight: 700;
      color: #d44c0a;
      background: linear-gradient(135deg, #e85d1a, #b33f0c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0.5rem 0 0.25rem;
      letter-spacing: -0.3px;
      line-height: 1.35;
      text-shadow: 0 2px 6px rgba(255, 140, 40, 0.5);
      word-break: break-word;
    }

    .steam-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ff7b2b;
      color: white;
      font-weight: 600;
      font-size: 0.8rem;
      padding: 0.25rem 1rem;
      border-radius: 30px;
      margin: 0.6rem 0 1.2rem;
      letter-spacing: 0.3px;
      background: linear-gradient(135deg, #ff893f, #e55b1e);
      box-shadow: 0 4px 10px rgba(230, 100, 20, 0.5);
      border: 1px solid #ffbb7a;
    }

    .loading-dots {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      margin: 1.2rem 0 1.5rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: #ff8533;
      border-radius: 50%;
      display: inline-block;
      animation: pulse-dot 1.4s infinite ease-in-out;
      box-shadow: 0 0 10px #ffa64d;
    }

    .dot:nth-child(2) {
      animation-delay: 0.2s;
      background: #ff9f4b;
    }

    .dot:nth-child(3) {
      animation-delay: 0.4s;
      background: #ffb366;
    }

    @keyframes pulse-dot {
      0%, 80%, 100% {
        transform: scale(0.7);
        opacity: 0.5;
      }
      40% {
        transform: scale(1.3);
        opacity: 1;
      }
    }

    .sub-text {
      font-size: 0.95rem;
      color: #9b4b2a;
      margin: 0.5rem 0 0.8rem;
      font-weight: 500;
      background: rgba(255, 220, 170, 0.5);
      padding: 0.4rem 0.8rem;
      border-radius: 50px;
      display: inline-block;
      backdrop-filter: blur(4px);
    }

    .retry-link {
      color: #d1531c;
      font-weight: 700;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
      cursor: pointer;
      transition: color 0.2s, text-shadow 0.2s;
      background: none;
      border: none;
      font-size: inherit;
      font-family: inherit;
      padding: 0 0.2rem;
    }

    .retry-link:hover {
      color: #ff5e0e;
      text-shadow: 0 0 8px #ffb485;
      text-decoration-thickness: 3px;
    }

    /* 分割装饰 - 缩小 */
    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(to right, #ffb978, #ff6f20, #ffb978);
      margin: 1rem auto;
      border-radius: 10px;
      opacity: 0.7;
    }

    /* 轻量链接行：去掉背景块，缩小字号 */
    .action-line {
      font-size: 0.8rem;
      color: #a0522d;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      flex-wrap: wrap;
      line-height: 1.4;
    }

    .bottom-actions {
        margin-top: 0.8rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
    }

    .action-table {
        border-collapse: collapse;
        font-size: 0.8rem;
        color: #a0522d;
    }

    .action-table td {
        padding: 0.15rem 0.3rem;
        vertical-align: middle;
        white-space: nowrap;
    }

    .action-table td:first-child {
        text-align: right;
    }

    .action-table td:last-child {
        text-align: left;
    }

    .action-link {
        color: #c53f0a;
        font-weight: 700;
        text-decoration: none;
        border-bottom: 1px dashed #e0662c;
        transition: all 0.2s;
        padding: 0.1rem 0.3rem;
        border-radius: 4px;
    }

    .action-link:hover {
        background: #ff9040;
        color: white;
        border-bottom: 1px solid white;
        box-shadow: 0 2px 8px rgba(255, 100, 0, 0.4);
    }

    .action-back-link {
      color: #c53f0a;
      transition: all 0.2s;
      padding: 0.1rem 0.3rem;
      border-radius: 4px;
    }

    @media (max-width: 450px) {
      .card {
        padding: 2.2rem 1.2rem 1.5rem;
      }
      .main-message {
        font-size: 1.6rem;
      }
      .action-line {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-orange">
        <picture>
            <img src="https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/282800/f05202e348f2962f82673c6cef0acd8b5b704026/capsule_231x87_2x.jpg" style="height: 131px;" alt="百分百鲜橙汁横幅">
        </picture>
    </div>

    <h1 class="main-message">
      正在尝试打开<br>百分百鲜橙汁（Steam版）
    </h1>

    <div class="steam-badge">
      <span>✅ 请允许打开Steam</span>
    </div>

    <div class="loading-dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div class="sub-text">
      <span>🔄 如果浏览器未自动跳转，可以</span>
      <button id="retryButton" class="retry-link" type="button">点击这里重试</button>
    </div>

    <div class="divider"></div>

    <div class="bottom-actions">
    <table class="action-table">
        <tr>
        <td>还没有游戏？ </td>
        <td>🛒<a href="https://store.steampowered.com/app/282800/" target="_blank" rel="noopener noreferrer" class="action-link">前往Steam购买</a></td>
        </tr>
        <tr>
        <td>还没有安装Steam？ </td>
        <td>⬇️<a href="https://store.steampowered.com/about/" target="_blank" rel="noopener noreferrer" class="action-link">前往官网下载</a></td>
        </tr>
    </table>
    </div>

    <div class="divider"></div>

    <div class="bottom-actions">
      <div class="action-line">
        <a 
          href="javascript:void(0)"
          onclick="history.back()"
          rel="noopener noreferrer" 
          class="action-back-link"
        >返回</a>
      </div>
    </div>

  </div>

  <script>
    (function() {
      'use strict';

      const STEAM_RUN_URL = 'steam://run/282800';

      function retryLaunch() {
        try {
          window.location.href = STEAM_RUN_URL;

          const retryBtn = document.getElementById('retryButton');
          if (retryBtn) {
            const originalText = retryBtn.textContent;
            retryBtn.textContent = '✓ 正在启动...';
            retryBtn.style.color = '#ff6200';
            setTimeout(() => {
              if (retryBtn) {
                retryBtn.textContent = originalText;
                retryBtn.style.color = '';
              }
            }, 2000);
          }
        } catch (err) {
          window.location.href = STEAM_RUN_URL;
        }
      }

      function setupRetryButton() {
        const retryBtn = document.getElementById('retryButton');
        if (retryBtn) {
          retryBtn.addEventListener('click', function(e) {
            e.preventDefault();
            retryLaunch();
          });
        }
      }

      window.addEventListener('DOMContentLoaded', function() {
        setupRetryButton();
      });

      if (document.readyState === 'complete' || document.readyState === 'interactive') {
        setTimeout(() => {
          setupRetryButton();
        }, 10);
      }
    })();
  </script>
</body>
</html>
